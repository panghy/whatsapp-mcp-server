name: CI

on:
  pull_request:
    branches: [main]
  merge_group:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run type-check
      - name: Build main (tsconfig.main.json)
        run: npx tsc --project tsconfig.main.json --noEmit
      - name: Build renderer
        run: npm run build:renderer
      - name: Run tests
        run: npm test -- --run --coverage --passWithNoTests

