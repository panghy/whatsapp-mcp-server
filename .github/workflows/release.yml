name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v1.0.1)'
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  semantic-release:
    if: startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    outputs:
      new-release-published: ${{ steps.semantic.outputs.new-release-published }}
      new-release-version: ${{ steps.semantic.outputs.new-release-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          OUTPUT=$(npx semantic-release 2>&1) || true
          echo "$OUTPUT"
          # Check for published release
          if echo "$OUTPUT" | grep -q "Published release"; then
            VERSION=$(echo "$OUTPUT" | grep -oE 'Published release [0-9]+\.[0-9]+\.[0-9]+' | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo "")
            echo "new-release-published=true" >> "$GITHUB_OUTPUT"
            echo "new-release-version=$VERSION" >> "$GITHUB_OUTPUT"
          elif echo "$OUTPUT" | grep -q "Created tag"; then
            VERSION=$(echo "$OUTPUT" | grep -oE 'Created tag v?[0-9]+\.[0-9]+\.[0-9]+' | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo "")
            echo "new-release-published=true" >> "$GITHUB_OUTPUT"
            echo "new-release-version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "new-release-published=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: [semantic-release]
    if: |
      always() &&
      (
        (needs.semantic-release.result == 'success' && needs.semantic-release.outputs.new-release-published == 'true') ||
        (needs.semantic-release.result == 'skipped') ||
        (inputs.tag != '')
      )
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || (needs.semantic-release.result == 'skipped' && github.ref || format('v{0}', needs.semantic-release.outputs.new-release-version)) }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Set version from semantic-release
        if: "!startsWith(github.ref, 'refs/tags/v') && needs.semantic-release.outputs.new-release-version != ''"
        shell: bash
        run: |
          VERSION="${{ needs.semantic-release.outputs.new-release-version }}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Set version from workflow input
        if: inputs.tag != ''
        shell: bash
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Import macOS certificate
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm certificate.p12

      - name: Build and publish Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ matrix.os == 'macos-latest' && secrets.APPLE_CERTIFICATE || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: "6947A73B2N"
        run: npm run build -- --publish always

  publish-release:
    needs: [semantic-release, build]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.build.result == 'success' &&
      (
        (needs.semantic-release.result == 'success' && needs.semantic-release.outputs.new-release-published == 'true') ||
        (needs.semantic-release.result == 'skipped') ||
        (inputs.tag != '')
      )
    steps:
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            # workflow_dispatch with explicit tag
            VERSION="${{ inputs.tag }}"
            VERSION="${VERSION#v}"
          elif [ "${{ needs.semantic-release.result }}" = "skipped" ]; then
            # Triggered by tag push (e.g., refs/tags/v1.0.0 -> 1.0.0)
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            # Triggered by semantic-release creating a new version
            VERSION="${{ needs.semantic-release.outputs.new-release-version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Publishing release v${{ steps.version.outputs.version }}"
          gh release edit "v${{ steps.version.outputs.version }}" --repo panghy/whatsapp-mcp-server --draft=false 2>/dev/null || echo "Release already published or not found as draft"
